services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    volumes:
      - orbit_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    ports:
      - '6379:6379'

volumes:
  orbit_pg_data:
